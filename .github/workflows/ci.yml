name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build ESM
        run: npm run build:esm

      - name: Build CJS
        run: npm run build:cjs

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Verify exports resolve
        run: |
          node -e "import('@puryfi/plugin-sdk')" 2>/dev/null || \
          node -e "
            const path = require('path');
            const pkg = require('./package.json');

            // Verify all declared export files exist
            const fs = require('fs');
            for (const [key, conditions] of Object.entries(pkg.exports)) {
              for (const [cond, file] of Object.entries(conditions)) {
                const resolved = path.resolve(file);
                if (!fs.existsSync(resolved)) {
                  console.error('Missing export:', key, cond, '->', file);
                  process.exit(1);
                }
                console.log('OK:', key, cond, '->', file);
              }
            }
          "
